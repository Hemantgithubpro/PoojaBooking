<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Pooja | Temple Seva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Mukta:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --saffron: #ff7a00;
            --saffron-dark: #d65f00;
            --white: #ffffff;
            --ink: #332211;
        }

        body {
            font-family: "Mukta", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(120deg, rgba(255, 122, 0, 0.18), rgba(255, 255, 255, 0.95)),
                radial-gradient(circle at 15% 85%, rgba(255, 122, 0, 0.18), transparent 45%),
                #ffffff;
        }

        .script-font {
            font-family: "Kalam", cursive;
        }

        .slot-btn[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .slot-btn.active {
            border-color: #c2410c;
            background-color: #ffedd5;
            box-shadow: 0 10px 20px -10px rgba(194, 65, 12, 0.55);
        }
    </style>
</head>

<body class="min-h-screen py-8 px-4">
    <main class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <p class="uppercase tracking-[0.2em] text-orange-700 text-sm font-semibold">Temple Seva</p>
            <h1 class="script-font text-4xl md:text-5xl text-orange-900 mt-3">Pandit Ji Booking Card</h1>
            <p class="text-orange-900/75 mt-2">Choose your Pandit Ji, date, and preferred 2-hour slot.</p>
        </header>

        <section class="bg-[var(--white)] border-2 border-orange-200 rounded-3xl shadow-2xl p-6 md:p-8">
            <form id="bookingForm" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label for="panditName" class="block text-sm font-semibold text-orange-900 mb-2">Select Pandit
                            Ji</label>
                        <select id="panditName" name="panditName" required
                            class="w-full rounded-xl border border-orange-300 bg-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                            <option value="">Choose Pandit Ji</option>
                            <option value="Pandit Ji A">Pandit Ji A</option>
                            <option value="Pandit Ji B">Pandit Ji B</option>
                        </select>
                    </div>

                    <div>
                        <label for="bookingDate" class="block text-sm font-semibold text-orange-900 mb-2">Choose
                            Date</label>
                        <input type="date" id="bookingDate" name="bookingDate" required
                            class="w-full rounded-xl border border-orange-300 bg-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                    </div>
                </div>

                <div>
                    <p class="block text-sm font-semibold text-orange-900 mb-3">Available Time Slots (2 Hours)</p>
                    <div id="slotGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
                    <input type="hidden" id="timeSlot" name="timeSlot" required />
                    <p id="slotHint" class="text-sm text-orange-800 mt-3">Select Pandit Ji and date to view live
                        availability.</p>
                </div>

                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label for="userName" class="block text-sm font-semibold text-orange-900 mb-2">Your Name</label>
                        <input type="text" id="userName" name="userName" placeholder="Enter full name" required
                            class="w-full rounded-xl border border-orange-300 bg-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-semibold text-orange-900 mb-2">Email
                            Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter email for confirmation" required
                            class="w-full rounded-xl border border-orange-300 bg-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                    </div>

                    <div>
                        <label for="mobile" class="block text-sm font-semibold text-orange-900 mb-2">Mobile
                            Number</label>
                        <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number"
                            pattern="[0-9]{10}" required
                            class="w-full rounded-xl border border-orange-300 bg-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                    </div>
                </div>

                <button id="submitBtn" type="submit"
                    class="w-full md:w-auto px-7 py-3 rounded-full text-white font-semibold shadow-lg transition hover:scale-[1.01]"
                    style="background: linear-gradient(90deg, var(--saffron), var(--saffron-dark));">
                    Confirm Booking
                </button>
            </form>

            <div id="resultCard" class="hidden mt-8 p-5 bg-white border border-orange-200 rounded-2xl"></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>

</html>
